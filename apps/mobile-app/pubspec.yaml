name: crewith_mobile
description: Crewith member app and operator mode.
publish_to: "none"
version: 0.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icons/icon_back_green.png"
  adaptive_icon_foreground: "assets/icons/icon_front_white.png"
  adaptive_icon_background: "#204131"
  min_sdk_android: 21

flutter_native_splash:
  color: "#204131"
  image: assets/icons/icon_front_white.png
  android_12:
    image: assets/icons/icon_front_white.png
    color: "#204131"
    icon_background_color: "#204131"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
