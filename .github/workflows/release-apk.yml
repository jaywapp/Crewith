name: Release Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile-app
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > apps/mobile-app/android/app/crewith-release.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=crewith-release.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > apps/mobile-app/android/key.properties

      - name: Get app version
        id: version
        working-directory: apps/mobile-app
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "tag=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Build release APK
        working-directory: apps/mobile-app
        run: flutter build apk --release --build-number=${{ steps.version.outputs.build_number }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          APK="apps/mobile-app/build/app/outputs/flutter-apk/app-release.apk"

          # 기존 릴리즈·태그 삭제 (없으면 무시)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # 현재 커밋에 태그 생성 후 릴리즈 발행
          gh release create "$TAG" "$APK" \
            --title "$TAG" \
            --generate-notes \
            --latest
