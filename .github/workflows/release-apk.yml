name: Release Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile-app
        run: flutter pub get

      - name: Decode keystore
        working-directory: apps/mobile-app/android/app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > crewith-release.jks

      - name: Create key.properties
        working-directory: apps/mobile-app/android
        run: |
          cat > key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=crewith-release.jks
          EOF

      - name: Build release APK
        working-directory: apps/mobile-app
        run: flutter build apk --release

      - name: Get app version
        id: version
        working-directory: apps/mobile-app
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: apps/mobile-app/build/app/outputs/flutter-apk/app-release.apk
