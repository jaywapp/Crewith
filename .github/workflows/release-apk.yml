name: Release Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile-app/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        id: flutter-cache
        with:
          path: ${{ runner.tool_cache }}/flutter
          key: flutter-stable-${{ runner.os }}

      - name: Install Flutter
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch stable \
            https://github.com/flutter/flutter.git \
            ${{ runner.tool_cache }}/flutter

      - name: Add Flutter to PATH
        run: echo "${{ runner.tool_cache }}/flutter/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: apps/mobile-app
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > apps/mobile-app/android/app/crewith-release.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=crewith-release.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > apps/mobile-app/android/key.properties

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(grep '^version:' apps/mobile-app/pubspec.yaml | awk '{print $2}')
          MAJOR=$(echo $CURRENT | cut -d'.' -f1)
          MINOR=$(echo $CURRENT | cut -d'.' -f2)
          PATCH=$(echo $CURRENT | cut -d'.' -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^version: .*/version: $NEW_VERSION/" apps/mobile-app/pubspec.yaml
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-app/pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }}"
          git push origin HEAD:refs/heads/main
          git push origin HEAD:refs/heads/develop

      - name: Build release APK
        working-directory: apps/mobile-app
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          APK="apps/mobile-app/build/app/outputs/flutter-apk/app-release.apk"

          gh release delete "$TAG" --yes 2>/dev/null || true

          git tag -f "$TAG"
          git push origin -f "refs/tags/$TAG"

          gh release create "$TAG" "$APK" \
            --title "$TAG" \
            --generate-notes \
            --latest
