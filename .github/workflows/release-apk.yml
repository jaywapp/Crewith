name: Release Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        id: flutter-cache
        with:
          path: ${{ runner.tool_cache }}/flutter
          key: flutter-stable-${{ runner.os }}

      - name: Install Flutter
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch stable \
            https://github.com/flutter/flutter.git \
            ${{ runner.tool_cache }}/flutter

      - name: Add Flutter to PATH
        run: echo "${{ runner.tool_cache }}/flutter/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: apps/mobile-app
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > apps/mobile-app/android/app/crewith-release.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=crewith-release.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > apps/mobile-app/android/key.properties

      - name: Get app version
        id: version
        working-directory: apps/mobile-app
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "tag=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Build release APK
        working-directory: apps/mobile-app
        run: flutter build apk --release --build-number=${{ steps.version.outputs.build_number }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          APK="apps/mobile-app/build/app/outputs/flutter-apk/app-release.apk"

          # 기존 릴리즈 삭제 (없으면 무시)
          gh release delete "$TAG" --yes 2>/dev/null || true

          # 태그를 현재 커밋으로 강제 이동
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin -f "refs/tags/$TAG"

          # 릴리즈 발행
          gh release create "$TAG" "$APK" \
            --title "$TAG" \
            --generate-notes \
            --latest
